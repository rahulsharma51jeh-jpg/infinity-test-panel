<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
<title>Infinity Test Panel — BSEB Smart Exam Platform</title>
<style>
:root{--brand:#4f46e5;--brand2:#06b6d4;--grad:linear-gradient(135deg,#6366f1,#06b6d4);--r:16px;--rs:10px}
[data-theme=light]{--bg:#f4f6fb;--surface:#fff;--s2:#f1f5f9;--text:#0f172a;--soft:#475569;--muted:#94a3b8;--border:#e2e8f0;--easy:#16a34a;--med:#d97706;--hard:#dc2626;--okbg:#dcfce7;--okfg:#166534;--nobg:#fee2e2;--nofg:#991b1b}
[data-theme=dark]{--bg:#0b1020;--surface:#141b33;--s2:#1b2342;--text:#e6ebf5;--soft:#aab4cf;--muted:#6b7796;--border:#25304f;--easy:#22c55e;--med:#f59e0b;--hard:#f87171;--okbg:#064e3b;--okfg:#bbf7d0;--nobg:#4c1d24;--nofg:#fecaca}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,"Noto Sans Devanagari",Arial,sans-serif;background:var(--bg);color:var(--text);transition:.25s}
h1,h2,h3,h4{margin:0 0 .4em;line-height:1.2}
p{line-height:1.6;color:var(--soft)}
button{font-family:inherit;cursor:pointer}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;padding:12px 16px;background:color-mix(in srgb,var(--surface) 90%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px;font-weight:800}
.logo{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;color:#fff;font-size:18px}
.brand small{display:block;font-weight:500;font-size:.66rem;color:var(--muted)}
.nav{display:flex;gap:4px;margin-left:8px;flex:1;overflow-x:auto}
.nav button{padding:8px 14px;border:none;border-radius:999px;font-size:.88rem;font-weight:700;color:var(--soft);background:transparent;white-space:nowrap}
.nav button:hover{background:var(--s2);color:var(--text)}
.nav button.active{background:var(--brand);color:#fff}
.actions{display:flex;gap:8px;margin-left:auto}
.icon-btn{border:1px solid var(--border);background:var(--s2);color:var(--text);min-width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:1.05rem;font-weight:700;padding:0 10px}
.wrap{max-width:1140px;margin:0 auto;padding:20px 16px 96px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 2px 10px rgba(2,6,23,.05)}
.pad{padding:18px}
.grid{display:grid;gap:16px}
.c4{grid-template-columns:repeat(4,1fr)}.c3{grid-template-columns:repeat(3,1fr)}.c2{grid-template-columns:repeat(2,1fr)}
.muted{color:var(--muted)}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.row:last-child{border:none}
.hero{position:relative;overflow:hidden;border-radius:var(--r);padding:26px;color:#fff;background:var(--grad)}
.hero h1{font-size:1.55rem}.hero p{color:rgba(255,255,255,.9);max-width:560px}
.hero .deco{position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.12)}
.ha{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);padding:11px 18px;border-radius:12px;font-weight:700;font-size:.92rem;transition:.12s}
.btn:hover{transform:translateY(-1px)}
.btn.primary{background:var(--grad);color:#fff;border:none;box-shadow:0 8px 20px rgba(79,70,229,.35)}
.btn.ghost{background:transparent}
.btn.block{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}
.hero .btn{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);color:#fff}
.hero .btn.primary{background:#fff;color:var(--brand)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:.8rem;font-weight:700;border:1px solid var(--border);background:var(--s2);color:var(--soft);user-select:none}
.chip.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.chip.sm{font-size:.7rem;padding:3px 9px}
.optrow{display:flex;flex-wrap:wrap;gap:8px}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.tile{border:1.5px solid var(--border);background:var(--s2);border-radius:12px;padding:12px;text-align:center;font-weight:700;font-size:.88rem;color:var(--text)}
.tile:hover{border-color:var(--brand)}
.tile.active{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 12%,transparent);color:var(--brand)}
.tile .ic{font-size:1.5rem;display:block;margin-bottom:4px}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.7rem;font-weight:800}
.badge.easy{background:color-mix(in srgb,var(--easy) 18%,transparent);color:var(--easy)}
.badge.medium{background:color-mix(in srgb,var(--med) 18%,transparent);color:var(--med)}
.badge.hard{background:color-mix(in srgb,var(--hard) 18%,transparent);color:var(--hard)}
.badge.type{background:color-mix(in srgb,var(--brand) 14%,transparent);color:var(--brand)}
.badge.pyq{background:color-mix(in srgb,var(--brand2) 22%,transparent);color:var(--brand2)}
.field{margin-bottom:18px}.field>label{display:block;font-weight:700;margin-bottom:8px;font-size:.92rem}
input[type=range]{width:100%;accent-color:var(--brand)}
input,select,textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:inherit;font-size:.95rem}
textarea{resize:vertical;min-height:80px}
.stat{padding:16px;display:flex;flex-direction:column;gap:6px}
.stat .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:1.1rem;background:color-mix(in srgb,var(--brand) 12%,transparent)}
.stat .v{font-size:1.7rem;font-weight:800}.stat .l{font-size:.78rem;color:var(--muted);font-weight:600}
.qmeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.qprompt{font-size:1.06rem;font-weight:600;white-space:pre-wrap;line-height:1.55;margin:8px 0 18px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:12px;border:1.5px solid var(--border);background:var(--s2);border-radius:12px;padding:12px 14px;text-align:left;color:var(--text);font-size:.96rem;width:100%}
.opt:hover{border-color:var(--brand)}
.opt.sel{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 12%,transparent)}
.opt.correct{border-color:var(--easy);background:var(--okbg);color:var(--okfg)}
.opt.wrong{border-color:var(--hard);background:var(--nobg);color:var(--nofg)}
.opt .k{width:28px;height:28px;flex:none;border-radius:8px;display:grid;place-items:center;font-weight:800;background:var(--surface);border:1px solid var(--border)}
.runner{display:grid;grid-template-columns:1fr 240px;gap:18px;align-items:start}
.rhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:1.05rem;padding:8px 14px;border-radius:12px;background:var(--s2);border:1px solid var(--border)}
.timer.warn{color:var(--hard);border-color:var(--hard)}
.palette{position:sticky;top:78px}
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}
.pbtn{aspect-ratio:1;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-weight:800;font-size:.85rem}
.pbtn.done{background:var(--easy);color:#fff;border-color:var(--easy)}
.pbtn.cur{outline:3px solid var(--brand);outline-offset:1px}
.ring{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;margin:14px auto}
.ring .in{width:116px;height:116px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}
.ring .in b{font-size:1.9rem;display:block}
.rev{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.rev.correct{border-left:4px solid var(--easy)}.rev.wrong{border-left:4px solid var(--hard)}.rev.skip{border-left:4px solid var(--muted)}
.exp{margin-top:10px;padding:12px;border-radius:10px;background:var(--s2);font-size:.9rem}
.steps{margin:6px 0 0;padding-left:18px}.steps li{margin:4px 0;color:var(--soft)}
.bars{display:flex;align-items:flex-end;gap:10px;height:150px;padding-top:10px}
.bcol{flex:1;min-width:24px;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%}
.bar{width:70%;border-radius:8px 8px 0 0;background:var(--grad);min-height:4px}
.blab{font-size:.7rem;color:var(--muted)}.bval{font-size:.72rem;font-weight:800}
.prog{height:8px;border-radius:999px;background:var(--s2);overflow:hidden;margin-top:4px}.prog>span{display:block;height:100%;background:var(--grad)}
.empty{text-align:center;padding:36px 16px;color:var(--muted)}.empty .e{font-size:2.4rem}
.sectitle{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:24px 0 12px}.sectitle h2{font-size:1.15rem}
.bnav{display:none}
.fade{animation:f .3s ease}@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.spin{width:42px;height:42px;border-radius:50%;border:4px solid var(--s2);border-top-color:var(--brand);animation:sp .8s linear infinite;margin:16px auto}@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:900px){.c4{grid-template-columns:repeat(2,1fr)}.c3,.c2{grid-template-columns:1fr}.runner{grid-template-columns:1fr}.palette{position:static}}
@media(max-width:640px){.nav{display:none}.wrap{padding:16px 12px 92px}
.bnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;background:color-mix(in srgb,var(--surface) 94%,transparent);backdrop-filter:blur(10px);border-top:1px solid var(--border);justify-content:space-around;padding:6px 2px}
.bnav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.6rem;font-weight:700;color:var(--muted);padding:4px 6px;border-radius:10px}
.bnav button.active{color:var(--brand)}.bnav .bi{font-size:1.2rem}}
</style>
</head>

var lang = localStorage.getItem("itp_lang") || "en";
var theme = localStorage.getItem("itp_theme") || "light";
var state = {view:"dash", gen:{cls:10,sub:"science",chaps:[],diff:"mixed",mode:"chapter",count:8}, test:null, cur:0, resp:{}, secLeft:0, timer:null, lastResult:null, admin:{cls:10,sub:"science",chap:"light",diff:"medium",opts:["","","",""],correct:0}};
var KEYS=["A","B","C","D","E"];
function t(k){return (T[lang]&&T[lang][k])||T.en[k]||k;}
function esc(s){return (""+s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function sname(id){return lang==="hi"&&SUBJ[id]?SUBJ[id].hi:(SUBJ[id]?SUBJ[id].n:id);}
function cname(id){return lang==="hi"&&CHAP[id]?CHAP[id].hi:(CHAP[id]?CHAP[id].n:id);}
function tname(ty){return lang==="hi"&&TYPE[ty]?TYPE[ty].hi:(TYPE[ty]?TYPE[ty].n:ty);}
function qtext(q){return lang==="hi"&&q.qHi?q.qHi:q.q;}
function qopts(q){return lang==="hi"&&q.optsHi?q.optsHi:(q.opts||[]);}
function qexp(q){return lang==="hi"&&q.expHi?q.expHi:q.exp;}

/* ---------- Data helpers ---------- */
function customQ(){try{return JSON.parse(localStorage.getItem("itp_custom")||"[]");}catch(e){return [];}}
function allQ(){return QUESTIONS.concat(customQ());}
function results(){try{return JSON.parse(localStorage.getItem("itp_results")||"[]");}catch(e){return [];}}
function saveResult(r){var a=results();a.unshift(r);localStorage.setItem("itp_results",JSON.stringify(a.slice(0,100)));}
function classes(){var s={};allQ().forEach(function(q){s[q.cls]=1;});return Object.keys(s).map(Number).sort(function(a,b){return a-b;});}
function subjectsOf(cls){var s={};allQ().forEach(function(q){if(q.cls===cls)s[q.sub]=1;});return Object.keys(s);}
function chaptersOf(cls,sub){var s={};allQ().forEach(function(q){if(q.cls===cls&&q.sub===sub)s[q.chap]=1;});return Object.keys(s);}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

/* ---------- Analytics ---------- */
function overview(){var rs=results();var solved=0,corr=0,att=0;rs.forEach(function(r){solved+=r.attempted;att+=r.attempted;corr+=r.correct;});
 return {tests:rs.length,solved:solved,acc:att?Math.round(corr/att*100):0,streak:streak(rs)};}
function streak(rs){if(!rs.length)return 0;var d={};rs.forEach(function(r){d[new Date(r.at).toDateString()]=1;});var n=0,day=new Date();
 if(!d[day.toDateString()])day.setDate(day.getDate()-1);while(d[day.toDateString()]){n++;day.setDate(day.getDate()-1);}return n;}
function chapterStats(){var m={};results().forEach(function(r){(r.ans||[]).forEach(function(a){if(!a.att)return;var k=r.cls+"|"+r.sub+"|"+a.chap;if(!m[k])m[k]={cls:r.cls,sub:r.sub,chap:a.chap,total:0,correct:0};m[k].total++;if(a.correct)m[k].correct++;});});
 return Object.keys(m).map(function(k){var s=m[k];s.acc=Math.round(s.correct/s.total*100);return s;});}
function weakChapters(){return chapterStats().filter(function(s){return s.total>=2&&s.acc<60;}).sort(function(a,b){return a.acc-b.acc;}).slice(0,6);}
function subjectStats(){var m={};results().forEach(function(r){if(!m[r.sub])m[r.sub]={sub:r.sub,total:0,correct:0};m[r.sub].total+=r.attempted;m[r.sub].correct+=r.correct;});
 return Object.keys(m).map(function(k){var s=m[k];s.acc=s.total?Math.round(s.correct/s.total*100):0;return s;}).sort(function(a,b){return b.acc-a.acc;});}

/* ---------- Generator ---------- */
function availCount(){var g=state.gen;var p=allQ().filter(function(q){return q.cls===g.cls&&q.sub===g.sub;});
 if(g.mode!=="full"&&g.chaps.length)p=p.filter(function(q){return g.chaps.indexOf(q.chap)>=0;});
 if(g.mode==="pyq")p=p.filter(function(q){return q.pyq&&q.pyq.length;});return p.length;}
function generate(){var g=state.gen;var p=allQ().filter(function(q){return q.cls===g.cls&&q.sub===g.sub;});
 if(g.mode!=="full"&&g.chaps.length)p=p.filter(function(q){return g.chaps.indexOf(q.chap)>=0;});
 if(g.mode==="pyq")p=p.filter(function(q){return q.pyq&&q.pyq.length;});
 var sel;if(g.diff==="mixed"){sel=shuffle(p);}else{var ex=shuffle(p.filter(function(q){return q.diff===g.diff;}));var rest=shuffle(p.filter(function(q){return q.diff!==g.diff;}));sel=ex.concat(rest);}
 sel=sel.slice(0,Math.min(g.count,p.length));
 var totalMarks=sel.reduce(function(s,q){return s+q.marks;},0);
 var dur=g.mode==="board"?180:Math.max(5,Math.round(totalMarks*1.25));
 state.test={questions:sel,totalMarks:totalMarks,dur:dur,mode:g.mode,diff:g.diff,cls:g.cls,sub:g.sub};
 state.cur=0;state.resp={};state.secLeft=dur*60;
 setView("running");startTimer();}
function startTimer(){if(state.timer)clearInterval(state.timer);state.timer=setInterval(function(){state.secLeft--;var el=document.getElementById("timer");
 if(el){var m=Math.floor(state.secLeft/60),s=state.secLeft%60;el.textContent="⏱ "+t("timeLeft")+": "+(m<10?"0":"")+m+":"+(s<10?"0":"")+s;el.className="timer"+(state.secLeft<=60?" warn":"");}
 if(state.secLeft<=0){clearInterval(state.timer);submitTest(true);}},1000);}

/* ---------- Submit & result ---------- */
function submitTest(auto){if(!auto&&!confirm(t("confirm")))return;if(state.timer)clearInterval(state.timer);
 var ansArr=state.test.questions.map(function(q){var r=state.resp[q.id];var obj=q.opts&&q.ans!=null;
  var att=obj?(r&&r.idx!=null):(r&&r.txt&&r.txt.trim().length>0);var correct=obj?(r&&r.idx===q.ans):false;
  return {id:q.id,chap:q.chap,att:!!att,correct:!!correct,marks:q.marks,awarded:correct?q.marks:0,idx:r?r.idx:null,txt:r?r.txt:""};});
 var res={id:state.test.cls+"-"+Date.now(),at:Date.now(),cls:state.test.cls,sub:state.test.sub,mode:state.test.mode,
  totalQ:state.test.questions.length,totalMarks:state.test.totalMarks,
  awarded:ansArr.reduce(function(s,a){return s+a.awarded;},0),correct:ansArr.filter(function(a){return a.correct;}).length,
  attempted:ansArr.filter(function(a){return a.att;}).length,dur:state.test.dur*60-state.secLeft,ans:ansArr,questions:state.test.questions};
 saveResult(res);state.lastResult=res;setView("result");}

/* ---------- Navigation ---------- */
function setView(v){if(v!=="running"&&state.timer){clearInterval(state.timer);state.timer=null;}state.view=v;render();window.scrollTo(0,0);}
function setLang(l){lang=l;localStorage.setItem("itp_lang",l);document.documentElement.lang=l;render();}
function setTheme(th){theme=th;localStorage.setItem("itp_theme",th);document.documentElement.setAttribute("data-theme",th);render();}
function toggleTheme(){setTheme(theme==="light"?"dark":"light");}
function toggleLang(){setLang(lang==="en"?"hi":"en");}
window.ITP={setView:setView,generate:generate,submitTest:submitTest,toggleTheme:toggleTheme,toggleLang:toggleLang};

ITP.gcls=function(c){state.gen.cls=c;var subs=subjectsOf(c);if(subs.indexOf(state.gen.sub)<0)state.gen.sub=subs[0];state.gen.chaps=[];render();};
ITP.gsub=function(s){state.gen.sub=s;state.gen.chaps=[];render();};
ITP.gtog=function(ch){var i=state.gen.chaps.indexOf(ch);if(i>=0)state.gen.chaps.splice(i,1);else state.gen.chaps.push(ch);render();};

ITP.genGo=function(){if(availCount()===0)return;state.view="generating";render();setTimeout(generate,650);};

/* ---------- Runner interactions ---------- */
ITP.sel=function(i){var q=state.test.questions[state.cur];state.resp[q.id]={idx:i};render();};

ITP.nav=function(d){var n=state.cur+d;if(n>=0&&n<state.test.questions.length){state.cur=n;render();}};
ITP.goto=function(i){state.cur=i;render();};
ITP.clr=function(){var q=state.test.questions[state.cur];delete state.resp[q.id];render();};

ITP.psub=function(s){state.pyq=state.pyq||{};state.pyq.sub=s;render();};
ITP.startPyq=function(){var p=state.pyq||{cls:10,sub:"science"};state.gen.cls=p.cls;state.gen.sub=p.sub;state.gen.chaps=[];state.gen.mode="pyq";state.gen.diff="mixed";state.gen.count=8;ITP.genGo();};

function viewResult(){
 var r=state.lastResult;if(!r)return '<div class="empty"><div class="e">📊</div><p>No result.</p></div>';
 var pct=r.totalMarks?Math.round(r.awarded/r.totalMarks*100):0;var acc=r.attempted?Math.round(r.correct/r.attempted*100):0;
 var avg=r.attempted?Math.round(r.dur/r.attempted):0;var verdict=pct>=75?t("great"):pct>=40?t("ok"):t("low");
 var color=pct>=75?"var(--easy)":pct>=40?"var(--med)":"var(--hard)";
 var ring='<div class="ring" style="background:conic-gradient(var(--brand) '+pct+'%,var(--s2) 0)"><div class="in"><div><b>'+pct+'%</b><span class="muted" style="font-size:.78rem">'+r.awarded+'/'+r.totalMarks+' '+t("marks")+'</span></div></div></div>';
 var mini='<div class="grid c4" style="margin-top:12px">'+
   miniCard(t("correct"),r.correct,"var(--easy)")+miniCard(t("incorrect"),r.attempted-r.correct,"var(--hard)")+
   miniCard(t("skipped"),r.totalQ-r.attempted,"var(--muted)")+miniCard(t("accuracy"),acc+"%","var(--brand)")+'</div>'+
   '<div class="grid c2" style="margin-top:12px">'+miniCard(t("timeTaken"),Math.floor(r.dur/60)+"m "+(r.dur%60)+"s")+miniCard(t("avgQ"),avg+"s")+'</div>';
 var rev=state._rev!==false?'<div style="margin-top:18px"><h3>🔍 '+t("review")+'</h3>'+r.questions.map(function(q,i){return reviewItem(q,i,r);}).join("")+'</div>':"";
 return '<div class="card pad" style="text-align:center"><h2>🎉 '+t("resTitle")+'</h2><p class="muted" style="margin-top:0">'+(SUBJ[r.sub]?SUBJ[r.sub].ic:"")+' Class '+r.cls+' · '+sname(r.sub)+'</p>'+ring+
  '<p style="font-weight:700;margin-top:6px;color:'+color+'">'+verdict+'</p>'+mini+
  '<div style="display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap">'+
   '<button class="btn" onclick="ITP.toggleReview()">🔍 '+t("review")+'</button>'+
   '<button class="btn" onclick="ITP.setView(\'gen\')">🔁 '+t("retake")+'</button>'+
   '<button class="btn primary" onclick="ITP.setView(\'dash\')">🏠 '+t("home")+'</button></div></div>'+rev;}
function miniCard(l,v,c){return '<div class="card pad" style="padding:12px;text-align:center"><div style="font-size:1.3rem;font-weight:800;'+(c?"color:"+c:"")+'">'+v+'</div><div class="muted" style="font-size:.78rem">'+l+'</div></div>';}
function reviewItem(q,i,r){
 var a=null;for(var j=0;j<r.ans.length;j++){if(r.ans[j].id===q.id){a=r.ans[j];break;}}
 var obj=q.opts&&q.ans!=null;var cls=!a||!a.att?"skip":a.correct?"correct":"wrong";
 var body;
 if(obj){body='<div class="opts">'+qopts(q).map(function(o,k){var isC=k===q.ans;var isCh=a&&a.idx===k;var cc=isC?"correct":isCh?"wrong":"";return '<div class="opt '+cc+'"><span class="k">'+KEYS[k]+'</span><span>'+esc(o)+'</span><span style="margin-left:auto;font-size:.78rem;font-weight:700">'+(isC?"✓ "+t("correctAns"):isCh?t("yourAns"):"")+'</span></div>';}).join("")+'</div>';}
 else{body='<div class="exp"><strong>'+t("yourAns")+':</strong><p style="margin:4px 0 0;white-space:pre-wrap">'+(a&&a.txt&&a.txt.trim()?esc(a.txt):"— "+t("unattempted")+" —")+'</p></div>'+
   (q.ansText?'<div class="exp" style="border-left:3px solid var(--easy)"><strong>'+t("correctAns")+':</strong><p style="margin:4px 0 0;white-space:pre-wrap">'+esc(q.ansText)+'</p></div>':"");}
 var steps=q.steps&&q.steps.length?'<div class="exp"><strong>🪜 '+t("solution")+':</strong><ol class="steps">'+q.steps.map(function(s){return '<li>'+esc(s)+'</li>';}).join("")+'</ol></div>':"";
 var exp=qexp(q)?'<div class="exp"><strong>💡 '+t("explain")+':</strong><p style="margin:4px 0 0">'+esc(qexp(q))+'</p></div>':"";
 var pyqB=q.pyq&&q.pyq.length?'<span class="badge pyq">PYQ '+q.pyq.join(", ")+'</span>':"";
 return '<div class="rev '+cls+'"><div class="qmeta"><strong>'+t("question")+' '+(i+1)+'</strong><span class="badge '+q.diff+'">'+t(q.diff)+'</span>'+pyqB+'<span style="margin-left:auto">'+(!a||!a.att?"➖":a.correct?"✅":"❌")+'</span></div><div class="qprompt" style="font-size:1rem;margin:6px 0 12px">'+esc(qtext(q))+'</div>'+body+steps+exp+'</div>';}

   '<div class="field"><label>'+t("opt")+'</label>'+optInputs+'</div>'+
   '<button class="btn primary" onclick="ITP.asave()">💾 '+t("saveQ")+'</button></div>'+
  '<div class="card pad"><h3>📊 '+t("bank")+'</h3>'+summary+'</div></div>';}

function viewAbout(){
 var live=[["🤖","AI Auto Test Generator","Balances papers by class, subject, chapter & difficulty."],["🧪","7 test modes","Chapter, Full Syllabus, Board Mock, PYQ, Revision & more."],["⏱️","Exam simulation","Timer, question palette, OMR-style answering."],["📜","PYQ integration","Bihar Board questions with repeated-question highlights."],["📊","Analytics","Accuracy, weak-chapter detection, streaks & trends."],["🧑‍🏫","Teacher panel","Add questions to the live bank."],["🌐","Bilingual + themes","Hindi/English, dark/light, mobile-first, offline."]];
 var road=[["🧠","LLM generation & doubt solver"],["🗣️","Voice assistant + subjective auto-grading"],["☁️","Cloud backend, login, ranks & PDF export"],["📚","Full licensed PYQ bank + NEET/JEE foundation"]];
 return '<section class="hero"><div class="deco"></div><h1>∞ Infinity Test Panel</h1><p>'+t("tagline")+' — Class 6 to 12.</p></section>'+
  '<div class="grid c2" style="margin-top:16px"><div class="card pad"><h3>✅ Live in this build</h3>'+live.map(function(f){return '<div class="row"><div><strong>'+f[0]+' '+f[1]+'</strong><div class="muted" style="font-size:.85rem">'+f[2]+'</div></div></div>';}).join("")+'</div>'+
  '<div class="card pad"><h3>🚧 Roadmap</h3>'+road.map(function(f){return '<div class="row"><strong>'+f[0]+' '+f[1]+'</strong></div>';}).join("")+'<p class="muted" style="font-size:.82rem;margin-top:10px">MVP foundation — built to plug in these phases without rewrites.</p></div></div>';}

function render(){
 var v=state.view,body;
 if(v==="dash")body=viewDash();else if(v==="gen")body=viewGen();else if(v==="generating")body=viewGenerating();
 else if(v==="running")body=viewRunning();else if(v==="result")body=viewResult();else if(v==="pyq")body=viewPyq();
 else if(v==="ana")body=viewAna();else if(v==="admin")body=viewAdmin();else if(v==="about")body=viewAbout();else body=viewDash();
 var chrome=(v==="running"||v==="generating")?"":topbar();
 var bn=(v==="running"||v==="generating")?"":bottomnav();
 document.getElementById("app").innerHTML=chrome+'<div class="wrap fade">'+body+'</div>'+bn;}

document.documentElement.setAttribute("data-theme",theme);document.documentElement.lang=lang;render();

</script>
</body>
</html>
