<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Infinity Test Panel - BSEB Practice</title>
<style>
body{font-family:Segoe UI,system-ui,Arial,sans-serif;margin:0;background:#f4f6fb;color:#0f172a}
.bar{background:linear-gradient(135deg,#6366f1,#06b6d4);color:#fff;padding:18px 16px}
.bar h1{margin:0;font-size:1.15rem}
.wrap{max-width:760px;margin:0 auto;padding:18px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:14px}
.btn{background:#4f46e5;color:#fff;border:none;padding:12px 18px;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer}
label.opt{display:block;border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px;margin:6px 0;cursor:pointer}
.q{font-weight:600;margin-bottom:8px}
.ok{color:#16a34a;font-weight:700}
.no{color:#dc2626;font-weight:700}
.exp{background:#f1f5f9;border-radius:8px;padding:10px;margin-top:8px;font-size:.9rem}
.score{font-size:2rem;font-weight:800;text-align:center}
</style>
</head>
<body>
<div class="bar"><h1>Infinity Test Panel - BSEB Practice</h1></div>
<div class="wrap" id="app"></div>
<script>
var BANK=[
{q:"The image formed by a plane mirror is always:",o:["Real and inverted","Virtual and erect","Real and erect","Virtual and inverted"],a:1,e:"A plane mirror forms a virtual, erect, same-size image."},
{q:"2H2 + O2 -> 2H2O is an example of a:",o:["Decomposition","Displacement","Combination","Double displacement"],a:2,e:"Two reactants combine into one product."},
{q:"A solution turns blue litmus red. Its pH is most likely:",o:["8","7","10","3"],a:3,e:"Red from blue litmus means acid, so pH is below 7."},
{q:"Roots of x^2 - 4x + 4 = 0 are:",o:["Real and distinct","Real and equal","Imaginary","No roots"],a:1,e:"Discriminant = 0, so the roots are real and equal (x=2,2)."},
{q:"15th term of the AP 3, 7, 11, 15, ... is:",o:["55","59","63","51"],a:1,e:"a=3, d=4; a15 = 3 + 14*4 = 59."},
{q:"The Non-Cooperation Movement was launched in:",o:["1919","1920","1930","1942"],a:1,e:"It was launched by Mahatma Gandhi in 1920."},
{q:"Which soil is best for growing cotton?",o:["Laterite","Black","Alluvial","Arid"],a:1,e:"Black soil retains moisture and is ideal for cotton."},
{q:"A 10 V battery drives 0.5 A through a resistor. Resistance is:",o:["5 ohm","20 ohm","2 ohm","50 ohm"],a:1,e:"R = V / I = 10 / 0.5 = 20 ohm."}
];
var test=[],ans={};
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function start(){test=shuffle(BANK).slice(0,5);ans={};render();}
function pick(i,o){ans[i]=o;}
function render(){
 var app=document.getElementById("app");
 if(!test.length){app.innerHTML='<div class="card"><h2>Welcome!</h2><p>Take a quick 5-question Bihar Board practice test.</p><button class="btn" onclick="start()">Start Test</button></div>';return;}
 var h="";
 for(var i=0;i<test.length;i++){
  var q=test[i],opts="";
  for(var o=0;o<q.o.length;o++){opts+='<label class="opt"><input type="radio" name="q'+i+'" onclick="pick('+i+','+o+')"> '+q.o[o]+'</label>';}
  h+='<div class="card"><div class="q">Q'+(i+1)+'. '+q.q+'</div>'+opts+'</div>';
 }
 h+='<button class="btn" onclick="submit()">Submit Test</button>';
 app.innerHTML=h;
}
function submit(){
 var s=0,i,o;
 for(i=0;i<test.length;i++){if(ans[i]===test[i].a)s++;}
 var msg=s>=4?"Great job!":s>=2?"Good effort - keep practicing.":"Review the answers and try again.";
 var h='<div class="card"><div class="score">'+s+' / '+test.length+'</div><p style="text-align:center">'+msg+'</p></div>';
 for(i=0;i<test.length;i++){
  var q=test[i],your=ans[i],opts="";
  for(o=0;o<q.o.length;o++){
   var cls=o===q.a?"ok":(o===your?"no":"");
   var tag=o===q.a?"[Correct] ":(o===your?"[Your answer] ":"");
   opts+='<div class="'+cls+'">'+tag+q.o[o]+'</div>';
  }
  h+='<div class="card"><div class="q">Q'+(i+1)+'. '+q.q+'</div>'+opts+'<div class="exp"><b>Explanation:</b> '+q.e+'</div></div>';
 }
 h+='<button class="btn" onclick="start()">Take Another Test</button>';
 document.getElementById("app").innerHTML=h;
}
render();
</script>
</body>
</html>
